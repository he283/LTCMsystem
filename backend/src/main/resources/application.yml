server:
  port: 8081

spring:
  application:
    name: ltcm-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/LTCMsystem?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ltcmsystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ltcm-system-secret-key-2024-for-jwt-hs256-algorithm-sufficiently-long
  expiration: 86400000
